server {
    listen 8001;

    # Allow large payloads (for base64 background images in templates)
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api requests to backend container
    location /api/ {
        proxy_pass http://employee-backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 50m;
    }

    # Proxy /images requests to backend container
    location /images/ {
        proxy_pass http://employee-backend:5000/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}